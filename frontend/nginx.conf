server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Q23 — React Router: all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Q13 — Proxy API calls to backend (no /api prefix needed)
    # When REACT_APP_API_URL is empty, frontend calls relative paths
    # and nginx proxies them to the backend container
    location ~ ^/(customers|payments|dashboard|pix|health) {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1000;
}
